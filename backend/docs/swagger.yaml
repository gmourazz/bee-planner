        type: integer
      credits:
        type: integer
      end_date:
        type: string
      grade:
        type: number
      icon:
        type: string
      max_absences:
        type: integer
      name:
        type: string
      professor:
        type: string
      semester:
        type: string
      start_date:
        type: string
