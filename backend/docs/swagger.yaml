      rating:
        type: integer
      review:
        type: string
      title:
        type: string
    type: object
  courses.cursoRequest:
    properties:
      certificate:
        type: boolean
      certificate_expiry:
        type: string
      credential:
        type: string
      duration:
        type: string
      end_date:
        type: string
      platform:
        type: string
      progress:
        type: integer
      start_date:
        type: string
      status:
        type: string
      title:
        type: string
    type: object
  events.criarEventoRequest:
    properties:
      date:
        type: string
      description:
        type: string
      title:
        type: string
      type:
        type: string
    type: object
  events.editarEventoRequest:
    properties:
      date:
        type: string
      description:
        type: string
      title:
        type: string
      type:
        type: string
    type: object
  finance.criarTransacaoRequest:
    properties:
      amount:
        type: number
      category:
        type: string
      date:
        type: string
      description:
        type: string
      label:
        type: string
      recurring:
        type: boolean
      type:
        type: string
    type: object
  finance.editarTransacaoRequest:
