basePath: /api
definitions:
  auth.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.registerRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      phone:
        description: opcional — usuário pode cadastrar sem telefone
        type: string
    required:
    - email
    - password
    type: object
  books.criarLivroRequest:
    properties:
      author:
        type: string
      colorIdx:
        type: integer
      genres:
        items:
          type: string
