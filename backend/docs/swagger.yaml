host: localhost:3001
info:
  contact: {}
  description: 'API do BeePlanner — autenticação via JWT (Bearer). Todas as rotas
    /api/* (exceto /auth) exigem o header Authorization: Bearer <token>.'
  title: BeePlanner API
  version: "1.0"
paths:
  /auth/login:
